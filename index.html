<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    .card {
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
      padding: 32px 28px;
      margin-top: 24px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 40px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    p.desc {
      margin: 0 0 28px;
      color: #6b7280;
      line-height: 1.6;
      font-size: 21px;
    }

    .field {
      margin-bottom: 28px;
    }

    label {
      display: block;
      margin-bottom: 12px;
      font-weight: 800;
      font-size: 24px;
    }

    select {
      width: 100%;
      min-height: 156px;
      padding: 28px 30px;
      border: 2px solid #d1d5db;
      border-radius: 22px;
      font-size: 32px;
      font-weight: 700;
      -webkit-appearance: none;
      appearance: none;
      background: #fff;
    }

    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    .result {
      margin-top: 30px;
      padding: 28px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 22px;
      min-height: 180px;
    }

    .result-title {
      font-size: 20px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .dealer-name {
      font-size: 42px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 12px;
      line-height: 1.25;
      word-break: keep-all;
    }

    .meta {
      color: #4b5563;
      line-height: 1.7;
      font-size: 24px;
    }

    .not-found {
      color: #dc2626;
      font-weight: 700;
      font-size: 24px;
    }

    .hint {
      margin-top: 24px;
      font-size: 20px;
      color: #6b7280;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .wrap {
        padding: 14px 14px 32px;
      }

      .card {
        padding: 24px 18px;
        border-radius: 22px;
      }

      h1 {
        font-size: 30px;
      }

      p.desc {
        font-size: 18px;
      }

      label {
        font-size: 20px;
      }

      select {
        min-height: 132px;
        padding: 22px 22px;
        font-size: 28px;
        border-radius: 20px;
      }

      .result {
        min-height: 150px;
        padding: 22px;
      }

      .result-title {
        font-size: 18px;
      }

      .dealer-name {
        font-size: 34px;
      }

      .meta,
      .not-found {
        font-size: 20px;
      }

      .hint {
        font-size: 17px;
      }
    }
  </style>
</head>

    const sidoEl = document.getElementById("sidoSelect");
    const sigunguEl = document.getElementById("sigunguSelect");
    const resultBox = document.getElementById("resultBox");

    function getSido(sigungu) {
      return (sigungu || "").trim().split(/\s+/)[0] || "";
    }

    function renderSidoOptions() {
      const sidoList = [...new Set(dealerData.map(item => getSido(item.sigungu)).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, "ko"));

      sidoList.forEach(sido => {
        const option = document.createElement("option");
        option.value = sido;
        option.textContent = sido;
        sidoEl.appendChild(option);
      });
    }

    function renderSigunguOptions(selectedSido) {
      sigunguEl.innerHTML = "";

      if (!selectedSido) {
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "시도를 먼저 선택하세요";
        sigunguEl.appendChild(placeholder);
        sigunguEl.disabled = true;
        return;
      }

      const placeholder = document.createElement("option");
      placeholder.value = "";
      placeholder.textContent = "선택하세요";
      sigunguEl.appendChild(placeholder);

      const sigunguList = dealerData
        .filter(item => getSido(item.sigungu) === selectedSido)
        .map(item => item.sigungu)
        .sort((a, b) => a.localeCompare(b, "ko"));

      sigunguList.forEach(sigungu => {
        const option = document.createElement("option");
        option.value = sigungu;
        option.textContent = sigungu;
        sigunguEl.appendChild(option);
      });

      sigunguEl.disabled = false;
    }

    function renderResult() {
      const selectedSigungu = sigunguEl.value;

      if (!selectedSigungu) {
        resultBox.innerHTML = `
          <div class="result-title">조회 결과</div>
          <div class="meta">시군구를 선택하면 배정 대리점이 표시됩니다.</div>
        `;
        return;
      }

      const found = dealerData.find(item => item.sigungu === selectedSigungu);

      if (!found) {
        resultBox.innerHTML = `
          <div class="result-title">조회 결과</div>
          <div class="not-found">해당 시군구에 배정된 대리점 정보가 없습니다.</div>
        `;
        return;
      }

      resultBox.innerHTML = `
        <div class="result-title">조회 결과</div>
        <div class="dealer-name">${found.dealer}</div>
        <div class="meta">담당 지역: ${found.sigungu}</div>
      `;
    }

    sidoEl.addEventListener("change", () => {
      renderSigunguOptions(sidoEl.value);
      resultBox.innerHTML = `
        <div class="result-title">조회 결과</div>
        <div class="meta">시군구를 선택하면 배정 대리점이 표시됩니다.</div>
      `;
    });

    sigunguEl.addEventListener("change", renderResult);

    renderSidoOptions();
  </script>
