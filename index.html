  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", Arial, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }
    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
      padding: 22px 18px;
      margin-top: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
    p.desc {
      margin: 0 0 20px;
      color: #6b7280;
      line-height: 1.55;
      font-size: 15px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 800;
      font-size: 14px;
    }
    input, select, button {
      background: #2563eb;
      color: #fff;
      border: none;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      min-height: 56px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    button {
      background: #2563eb;
      color: #fff;
      border: none;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover {
      background: #1d4ed8;
    }
    .result {
      margin-top: 22px;
      padding: 18px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      min-height: 100px;
    }
    .result-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }
    .dealer-name {
      font-size: 24px;
      font-weight: 900;
      color: #111827;
      margin-bottom: 8px;
      line-height: 1.3;
      word-break: keep-all;
    }
    .meta {
      color: #4b5563;
      line-height: 1.6;
    }
    .not-found {
      color: #dc2626;
      font-weight: 700;
    }
    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .chip {
      border: 1px solid #dbe3f0;
      background: #f8fafc;
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 13px;
      color: #475569;
    }
    @media (max-width: 480px) {
      .wrap {
        padding: 12px 12px 28px;
      }
      .card {
        padding: 18px 14px;
        border-radius: 18px;
      }
      h1 {
        font-size: 24px;
      }
      .dealer-name {
        font-size: 22px;
      }
    }
  </style>
</head>

    const sidoEl = document.getElementById('sidoSelect');
    const selectEl = document.getElementById('sigunguSelect');
        const resultBox = document.getElementById('resultBox');
    
    function normalize(text) {
      return (text || '').replace(/\s+/g, '').trim().toLowerCase();
    }

    function getSido(sigungu) {
      const parts = (sigungu || '').trim().split(/\s+/);
      return parts[0] || '';
    }

    function renderOptions() {
      const sidoList = [...new Set(dealerData.map(item => getSido(item.sigungu)).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'ko'));

      sidoList.forEach(sido => {
        const option = document.createElement('option');
        option.value = sido;
        option.textContent = sido;
        sidoEl.appendChild(option);
      });
    }

    function renderSigunguOptions(selectedSido) {
      selectEl.innerHTML = '';

      if (!selectedSido) {
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '시도를 먼저 선택하세요';
        selectEl.appendChild(placeholder);
        selectEl.disabled = true;
        return;
      }

      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '선택하세요';
      selectEl.appendChild(placeholder);

      const sigunguList = dealerData
        .filter(item => getSido(item.sigungu) === selectedSido)
        .map(item => item.sigungu)
        .sort((a, b) => a.localeCompare(b, 'ko'));

      sigunguList.forEach(sigungu => {
        const option = document.createElement('option');
        option.value = sigungu;
        option.textContent = sigungu;
        selectEl.appendChild(option);
      });

      selectEl.disabled = false;
    }

    function searchDealer() {
      const selectedValue = selectEl.value;
      const normalizedKeyword = normalize(selectedValue);

      if (!normalizedKeyword) {
        resultBox.innerHTML = `
          <div class="result-title">조회 결과</div>
          <div class="meta">시도와 시군구를 선택하면 배정 대리점이 표시됩니다.</div>
        `;
        return;
      }

      const found = dealerData.find(item => normalize(item.sigungu) === normalizedKeyword);

      if (found) {
        resultBox.innerHTML = `
          <div class="result-title">조회 결과</div>
          <div class="dealer-name">${found.dealer}</div>
          <div class="meta">
            담당 지역: ${found.sigungu}
          </div>
        `;
      } else {
        resultBox.innerHTML = `
          <div class="result-title">조회 결과</div>
          <div class="not-found">해당 시군구에 배정된 대리점 정보가 없습니다.</div>
        `;
      }
    }

    sidoEl.addEventListener('change', () => {
      renderSigunguOptions(sidoEl.value);
      resultBox.innerHTML = `
        <div class="result-title">조회 결과</div>
        <div class="meta">시군구를 선택하면 배정 대리점이 표시됩니다.</div>
      `;
    });

    selectEl.addEventListener('change', searchDealer);

    

    renderOptions();
  </script>
</body>
</html>
